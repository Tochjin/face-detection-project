<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Detection System</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Google Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top App Bar -->
    <nav class="app-bar">
        <button id="menu-btn" class="icon-btn">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <h1 class="app-title" id="page-title">Live Video</h1>
    </nav>

    <!-- Side Navigation Drawer -->
    <aside id="nav-drawer" class="nav-drawer">
        <div class="nav-links">
            <a href="#" class="nav-link active" data-target="view-live">
                <span class="material-symbols-outlined">videocam</span>
                Live Video
            </a>
            <a href="#" class="nav-link" data-target="view-register">
                <span class="material-symbols-outlined">person_add</span>
                Registration
            </a>
        </div>
    </aside>
    <div id="drawer-overlay" class="drawer-overlay"></div>

    <!-- Main Content Area -->
    <main class="main-content">
        <!-- View: Live Video -->
        <div id="view-live" class="view active">
            <div class="live-layout">
                <!-- Video Stream Area -->
                <div class="video-section">
                    <div class="video-container">
                        <img id="live-video" src="/video_feed" style="width: 100%; height: 100%; object-fit: cover; display: block;" onload="document.getElementById('video-placeholder').style.display='none'" onerror="document.getElementById('video-placeholder').style.display='flex'; setTimeout(() => { this.src = '/video_feed?' + new Date().getTime(); }, 2000);">
                        <div class="video-placeholder" id="video-placeholder">
                            <span class="material-symbols-outlined" style="font-size: 64px; color: #aaa;">videocam_off</span>
                            <p style="margin-top: 16px; color: #5F6368;" id="camera-status">Camera Offline</p>
                        </div>
                        <button id="toggle-cam-btn" class="icon-btn" style="position: absolute; bottom: 16px; left: 16px; background-color: rgba(255,255,255,0.9); box-shadow: var(--shadow-sm);" title="Toggle Camera">
                            <span class="material-symbols-outlined" id="toggle-cam-icon" style="color: #d93025;">videocam_off</span>
                        </button>
                        <button class="fullscreen-btn icon-btn" title="Fullscreen">
                            <span class="material-symbols-outlined">fullscreen</span>
                        </button>
                    </div>
                </div>
                
                <!-- Registration List Area -->
                <div class="registration-list-section">
                    <h2 style="margin-bottom: 12px;">Recent Detections</h2>
                    <div class="registration-list" id="recent-logs" style="flex: 1; max-height: none;">
                        <div style="text-align: center; color: var(--text-secondary); padding: 10px;">Waiting for detections...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- View: Face Registration -->
        <div id="view-register" class="view">
            <div class="live-layout">
                <div class="register-main-section" style="flex: 3; display: flex; flex-direction: column;">
                    <div class="register-layout" style="width: 100%; max-width: none; flex-grow: 1;">
                        <div class="photo-capture-section">
                            <!-- Photo 1 -->
                            <div class="photo-slot">
                                <div class="photo-box">
                                    <img id="img-1" style="width:100%; height:100%; object-fit:cover; border-radius:8px; display:none;">
                                    <span class="material-symbols-outlined" id="icon-1" style="color: #bdc1c6; font-size: 48px;">face</span>
                                </div>
                                <p style="text-align: center; margin-top: 8px; margin-bottom: 4px; font-weight: 500; color: var(--text-secondary); font-size: 14px;">Front Face</p>
                                <div class="photo-actions">
                                    <input type="file" id="file-1" accept="image/*" style="display:none;">
                                    <button class="action-btn" onclick="document.getElementById('file-1').click()">from file</button>
                                    <button class="action-btn webcam-capture-btn" data-target="1">from webcam</button>
                                </div>
                            </div>
                            <!-- Photo 2 -->
                            <div class="photo-slot">
                                <div class="photo-box">
                                     <img id="img-2" style="width:100%; height:100%; object-fit:cover; border-radius:8px; display:none;">
                                     <span class="material-symbols-outlined" id="icon-2" style="color: #bdc1c6; font-size: 48px;">face</span>
                                </div>
                                <p style="text-align: center; margin-top: 8px; margin-bottom: 4px; font-weight: 500; color: var(--text-secondary); font-size: 14px;">Left Side</p>
                                <div class="photo-actions">
                                    <input type="file" id="file-2" accept="image/*" style="display:none;">
                                    <button class="action-btn" onclick="document.getElementById('file-2').click()">from file</button>
                                    <button class="action-btn webcam-capture-btn" data-target="2">from webcam</button>
                                </div>
                            </div>
                            <!-- Photo 3 -->
                            <div class="photo-slot">
                                <div class="photo-box">
                                     <img id="img-3" style="width:100%; height:100%; object-fit:cover; border-radius:8px; display:none;">
                                     <span class="material-symbols-outlined" id="icon-3" style="color: #bdc1c6; font-size: 48px;">face</span>
                                </div>
                                <p style="text-align: center; margin-top: 8px; margin-bottom: 4px; font-weight: 500; color: var(--text-secondary); font-size: 14px;">Right Side</p>
                                <div class="photo-actions">
                                    <input type="file" id="file-3" accept="image/*" style="display:none;">
                                    <button class="action-btn" onclick="document.getElementById('file-3').click()">from file</button>
                                    <button class="action-btn webcam-capture-btn" data-target="3">from webcam</button>
                                </div>
                            </div>
                        </div>

                        <div class="registration-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Student ID:</label>
                                    <input type="text" id="reg-id" placeholder="Enter ID">
                                </div>
                                <div class="form-group flex-2">
                                    <label>Name:</label>
                                    <input type="text" id="reg-name" placeholder="Enter Name">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Gender:</label>
                                    <div class="select-wrapper">
                                        <select id="reg-gender">
                                            <option value="" disabled selected>Select Gender</option>
                                            <option>ชาย (Male)</option>
                                            <option>หญิง (Female)</option>
                                            <option>อื่นๆ (Other)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Faculty:</label>
                                    <input type="text" id="reg-faculty" placeholder="Enter Faculty">
                                </div>
                                <div class="form-group">
                                    <label>Department:</label>
                                    <input type="text" id="reg-dept" placeholder="Enter Department">
                                </div>
                            </div>
                            
                            <div class="form-submit">
                                <button class="register-btn">Register</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="registration-list-section" style="background-color: white; border: 1px solid var(--border-color); box-shadow: none;">
                    <div class="reg-list-header">
                        <h2>Registered Users</h2>
                        <span class="total-badge" id="total-users-badge">Total: 0</span>
                    </div>
                    <div class="search-container">
                        <span class="material-symbols-outlined search-icon">search</span>
                        <input type="text" id="search-users" placeholder="Search users...">
                    </div>
                    <div class="registration-list" id="registration-list" style="flex: 1;">
                        <div style="text-align: center; color: var(--text-secondary); padding: 20px;">
                            Loading users...
                        </div>
                    </div>
                    <button class="action-btn" id="add-new-user-btn" style="width: 100%; margin-top: 16px; background-color: #e8eaed; padding: 12px; display: flex; justify-content: center; align-items: center; gap: 8px;">
                        <span class="material-symbols-outlined" style="font-size: 20px;">person_add</span> Add New User
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Webcam Capture Modal -->
    <div id="webcam-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; flex-direction: column; justify-content: center; align-items: center;">
        <h2 style="color: white; margin-bottom: 20px; font-weight: 500;">Press <kbd style="background: #333; padding: 4px 10px; border-radius: 4px; border: 1px solid #555;">SPACE</kbd> to capture</h2>
        <video id="webcam-video" autoplay playsinline style="border-radius: 8px; max-width: 90%; max-height: 70vh; border: 4px solid var(--primary-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: scaleX(-1);"></video>
        <button id="close-webcam-btn" class="action-btn" style="margin-top: 24px; background-color: #d93025; color: white; padding: 10px 24px;">Cancel</button>
        <canvas id="webcam-canvas" style="display: none;"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
